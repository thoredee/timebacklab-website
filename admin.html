<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin — timebacklab</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif;
    background: #1c1e1f;
    color: #FBF9F2;
    margin: 0;
    padding: 32px 20px;
  }
  .hidden { display: none !important; }

  .logo-mark { font-weight: 800; letter-spacing: -0.04em; }
  .logo-mark .lt { color: #FBF9F2; }
  .logo-mark .ll { color: #C6E000; }

  /* ---- Login card ---- */
  .login-box {
    max-width: 360px;
    margin: 80px auto;
    background: #34383a;
    padding: 28px;
    border-radius: 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
  }
  .login-box h1 { font-size: 20px; margin: 0 0 20px; }
  .login-box label { display: block; margin-bottom: 8px; font-size: 14px; color: #C8B4EE; }
  .login-box input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #555;
    background: #1c1e1f;
    color: #FBF9F2;
    font-size: 14px;
    margin-bottom: 14px;
  }
  .btn-primary {
    background: #C6E000;
    color: #26292A;
    border: none;
    padding: 11px 20px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    font-size: 14px;
  }
  .btn-primary:hover { background: #d6f400; }
  .btn-ghost {
    background: none;
    border: 1px solid #555;
    color: #FBF9F2;
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .btn-ghost:hover { border-color: #C6E000; color: #C6E000; }
  .btn-danger {
    background: none;
    border: 1px solid #FF4081;
    color: #FF4081;
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  .btn-danger:hover { background: #FF4081; color: #26292A; }
  .error { color: #FF4081; font-size: 13px; margin-bottom: 10px; }

  /* ---- Console menu card ---- */
  .console-box {
    max-width: 640px;
    margin: 48px auto;
    background: #34383a;
    padding: 36px;
    border-radius: 20px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
  }
  .console-title {
    font-size: 26px;
    margin: 0 0 4px;
  }
  .console-sub {
    font-size: 14px;
    color: #C8B4EE;
    margin: 0 0 28px;
  }
  .menu-grid { display: flex; flex-direction: column; gap: 14px; }
  .menu-card {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    text-align: left;
    background: #26292A;
    border: 1px solid #3a3d3e;
    border-radius: 14px;
    padding: 18px 20px;
    cursor: pointer;
    color: inherit;
    font-family: inherit;
    transition: border-color .15s ease, transform .15s ease;
  }
  .menu-card:not(.disabled):hover {
    border-color: #C6E000;
    transform: translateY(-1px);
  }
  .menu-card.disabled { cursor: default; opacity: 0.55; }
  .menu-icon {
    flex: none;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: #C6E000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .menu-icon svg { width: 24px; height: 24px; }
  .menu-icon.dim { background: #4a4d4e; }
  .menu-text { flex: 1; min-width: 0; }
  .menu-title { font-size: 16px; font-weight: 700; margin: 0 0 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .menu-badge { font-size: 11px; font-weight: 600; color: #9a9d9e; text-transform: uppercase; letter-spacing: 0.03em; }
  .menu-desc { font-size: 13px; color: #b7bbbd; margin: 0; }
  .menu-arrow { flex: none; color: #6b6e6f; }
  .console-footer { margin-top: 24px; text-align: right; }

  /* ---- Submissions view ---- */
  .submissions-wrap { max-width: 1400px; margin: 0 auto; }
  .sub-card {
    background: #34383a;
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
  }
  .sub-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 26px;
    flex-wrap: wrap;
  }
  .sub-header-left { display: flex; align-items: center; gap: 14px; }
  .sub-header-left .logo-mark { font-size: 18px; }
  .sub-header h1 { font-size: 21px; margin: 0; font-weight: 700; }
  .sub-header-actions { display: flex; align-items: center; gap: 10px; }
  .count { font-size: 13px; color: #C8B4EE; margin-right: 4px; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .toolbar select {
    background: #1c1e1f;
    color: #FBF9F2;
    border: 1px solid #555;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13px;
  }
  .toolbar .btn-ghost.active { border-color: #C6E000; color: #C6E000; }

  .scroll-wrap { overflow: auto; max-height: 70vh; border-radius: 12px; border: 1px solid #3a3d3e; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; background: #1c1e1f; }
  th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #3a3d3e; white-space: nowrap; }
  th { background: #26292A; position: sticky; top: 0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; color: #C8B4EE; }
  tr:hover td { background: #24282a; }
  .group-row td { background: #2c1f45; color: #DDD0FF; font-weight: 700; font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.03em; }
  .view-btn {
    background: none;
    border: 1px solid #666;
    color: #C6E000;
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
  }
  .view-btn:hover { background: #C6E000; color: #26292A; border-color: #C6E000; }
  .tier-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 700;
    background: #480078;
    color: #DDD0FF;
  }

  /* ---- Modal ---- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 50;
  }
  .modal-card {
    background: #26292A;
    border-radius: 18px;
    max-width: 720px;
    width: 100%;
    max-height: 86vh;
    overflow-y: auto;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-card h2 { font-size: 19px; margin: 0 0 20px; }
  .modal-section-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #C6E000;
    font-weight: 700;
    margin: 0 0 12px;
  }
  .modal-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px 24px;
    margin-bottom: 22px;
  }
  .modal-field dt { font-size: 11.5px; color: #9a9d9e; margin-bottom: 2px; }
  .modal-field dd { font-size: 13.5px; margin: 0; word-break: break-word; }
  .modal-divider { border: none; border-top: 1px solid #3a3d3e; margin: 22px 0; }
  .qa-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 26px; }
  .qa-item { background: #34383a; border-radius: 10px; padding: 12px 14px; }
  .qa-question { font-size: 13px; margin: 0 0 6px; color: #FBF9F2; }
  .qa-meta { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
  .qa-category { font-size: 11px; color: #9a9d9e; text-transform: uppercase; letter-spacing: 0.03em; }
  .qa-answer { font-size: 13px; font-weight: 700; color: #C6E000; }
  .modal-actions { display: flex; justify-content: space-between; gap: 12px; margin-top: 8px; }

  /* ---- Report-nodes view extras ---- */
  .toolbar input.rn-search {
    background: #1c1e1f;
    color: #FBF9F2;
    border: 1px solid #555;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13px;
    min-width: 220px;
  }
  .toolbar input.rn-search:focus { outline: none; border-color: #C6E000; }
  td.rn-preview { max-width: 460px; overflow: hidden; text-overflow: ellipsis; color: #b7bbbd; }
  .rn-textarea {
    width: 100%;
    min-height: 240px;
    background: #1c1e1f;
    color: #FBF9F2;
    border: 1px solid #555;
    border-radius: 10px;
    padding: 14px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.6;
    resize: vertical;
  }
  .rn-textarea:focus { outline: none; border-color: #C6E000; }
  .rn-editor-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 2px 18px;
    font-size: 12.5px;
    color: #9a9d9e;
  }
  #rn-save-status { color: #C6E000; }
</style>
</head>
<body>

<div id="login-view" class="login-box">
  <h1>Admin login</h1>
  <div id="login-error" class="error hidden"></div>
  <label for="password-input">Password</label>
  <input type="password" id="password-input" placeholder="Enter admin password">
  <button type="button" id="login-btn" class="btn-primary">Log in</button>
</div>

<div id="menu-view" class="console-box hidden">
  <h1 class="console-title logo-mark"><span class="lt">//timeback</span><span class="ll">lab</span><span class="lt"> admin console</span></h1>
  <p class="console-sub">Choose an area to manage.</p>
  <div class="menu-grid" id="menu-grid"></div>
  <div class="console-footer">
    <button type="button" id="menu-logout-btn" class="btn-ghost">Log out</button>
  </div>
</div>

<div id="submissions-view" class="submissions-wrap hidden">
  <div class="sub-card">
    <div class="sub-header">
      <div class="sub-header-left">
        <span class="logo-mark"><span class="lt">//timeback</span><span class="ll">lab</span></span>
        <h1>Timeback score submissions</h1>
      </div>
      <div class="sub-header-actions">
        <span class="count" id="count-label"></span>
        <button type="button" id="back-btn" class="btn-ghost">Back to console</button>
        <button type="button" id="logout-btn" class="btn-ghost">Log out</button>
      </div>
    </div>

    <div class="toolbar">
      <button type="button" id="group-btn" class="btn-ghost">Group by company</button>
      <select id="sort-field">
        <option value="created_at">Sort by: Date</option>
        <option value="company_name">Sort by: Company</option>
        <option value="email">Sort by: Email</option>
        <option value="business_size">Sort by: Business size</option>
        <option value="role">Sort by: Role</option>
        <option value="tier_name">Sort by: Tier</option>
        <option value="leak_category">Sort by: Leak</option>
        <option value="score_percent">Sort by: Score</option>
        <option value="country">Sort by: Country</option>
        <option value="city">Sort by: City</option>
      </select>
      <button type="button" id="sort-dir-btn" class="btn-ghost">↓ Descending</button>
    </div>

    <div class="scroll-wrap">
      <table>
        <thead>
          <tr>
            <th>Submission ID</th>
            <th>Date</th>
            <th>Company</th>
            <th>Email</th>
            <th>Business size</th>
            <th>Role</th>
            <th>Tier</th>
            <th>Leak</th>
            <th>Score</th>
            <th>Country</th>
            <th>City</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="report-nodes-view" class="submissions-wrap hidden">
  <div class="sub-card">
    <div class="sub-header">
      <div class="sub-header-left">
        <span class="logo-mark"><span class="lt">//timeback</span><span class="ll">lab</span></span>
        <h1>Detailed report replies</h1>
      </div>
      <div class="sub-header-actions">
        <span class="count" id="rn-count-label"></span>
        <button type="button" id="rn-back-btn" class="btn-ghost">Back to console</button>
        <button type="button" id="rn-logout-btn" class="btn-ghost">Log out</button>
      </div>
    </div>

    <div class="toolbar">
      <button type="button" id="rn-group-btn" class="btn-ghost">Group by section</button>
      <select id="rn-section-filter">
        <option value="">All sections</option>
        <option value="systems">Systems</option>
        <option value="delegation">Delegation</option>
        <option value="prioritisation">Prioritisation</option>
        <option value="tech">Tech</option>
      </select>
      <select id="rn-role-filter">
        <option value="">All roles</option>
        <option value="boss">Boss</option>
        <option value="lead">Lead</option>
        <option value="office">Office</option>
        <option value="field">Field</option>
      </select>
      <input type="text" id="rn-search" class="rn-search" placeholder="Search id or text...">
    </div>

    <div class="scroll-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Section</th>
            <th>Role</th>
            <th>Company size</th>
            <th>Tier / question</th>
            <th>Preview</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="rn-table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="modal-root"></div>

<script>
  const PW_KEY = 'tbl_admin_pw';
  let submissions = [];
  let groupByCompany = false;
  let sortField = 'created_at';
  let sortDir = 'desc';

  let reportNodes = [];
  let rnGroupBySection = false;
  let rnSectionFilter = '';
  let rnRoleFilter = '';
  let rnSearch = '';

  const RN_SECTION_LABELS = { systems: 'Systems', delegation: 'Delegation', prioritisation: 'Prioritisation', tech: 'Tech' };
  const RN_SECTION_ORDER = ['systems', 'delegation', 'prioritisation', 'tech'];
  const RN_ROLE_LABELS = { boss: 'Boss', lead: 'Lead', office: 'Office', field: 'Field' };
  const RN_SIZE_LABELS = { solo: 'Solo / Micro', small: 'Small', medium: 'Medium / Large' };
  const RN_TIER_LABELS = { trapped: 'Trapped', overloaded: 'Overloaded', stretched: 'Stretched', driver: "Driver's seat" };

  const ICONS = {
    clipboard: '<svg viewBox="0 0 24 24" fill="none" stroke="#26292A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2"></rect><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"></path><path d="M9 11h6M9 15h6M9 7h6"></path></svg>',
    creditCard: '<svg viewBox="0 0 24 24" fill="none" stroke="#26292A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"></rect><path d="M2 10h20M6 15h4"></path></svg>',
    users: '<svg viewBox="0 0 24 24" fill="none" stroke="#26292A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>',
    userGear: '<svg viewBox="0 0 24 24" fill="none" stroke="#26292A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><circle cx="19" cy="16" r="2.5"></circle><path d="M19 12.5v1M19 18.5v1M15.9 14.2l.9.5M21.2 17.3l.9.5M15.9 17.8l.9-.5M21.2 14.7l.9-.5"></path></svg>',
    chevron: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M9 18l6-6-6-6"></path></svg>',
    docEdit: '<svg viewBox="0 0 24 24" fill="none" stroke="#26292A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"></path><path d="M8 8h5M8 12h4"></path><path d="M17.5 3.5a1.8 1.8 0 0 1 2.5 2.5L15 11l-3 .8.8-3z"></path></svg>',
  };

  const MENU_ITEMS = [
    {
      id: 'quiz-submissions',
      title: 'Timeback score submissions',
      desc: 'View all entries submitted into the system.',
      icon: ICONS.clipboard,
      live: true,
    },
    {
      id: 'report-nodes',
      title: 'Manage detailed report replies',
      desc: 'View and edit the detailed report content library.',
      icon: ICONS.docEdit,
      live: true,
    },
    {
      id: 'paid-reports',
      title: 'Paid requests for diagnostic reports',
      desc: 'Manage the requests for paid report requests.',
      icon: ICONS.creditCard,
      live: false,
    },
    {
      id: 'group-reports',
      title: 'Group diagnostic reports',
      desc: 'Manage co-ordinated group survey and reports.',
      icon: ICONS.users,
      live: false,
    },
    {
      id: 'account-management',
      title: 'Customer account management',
      desc: 'Create and manage online website accounts.',
      icon: ICONS.userGear,
      live: false,
    },
  ];

  function escapeHtml(str) {
    return String(str == null ? '' : str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function showView(id) {
    ['login-view', 'menu-view', 'submissions-view', 'report-nodes-view'].forEach(function (v) {
      document.getElementById(v).classList.toggle('hidden', v !== id);
    });
  }

  function showError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  async function fetchSubmissions(password) {
    const res = await fetch('/api/admin/submissions', {
      headers: { 'X-Admin-Password': password },
    });
    if (!res.ok) throw new Error(res.status === 401 ? 'Wrong password' : 'Request failed');
    return res.json();
  }

  async function deleteSubmission(password, submissionId) {
    const res = await fetch('/api/admin/submissions', {
      method: 'DELETE',
      headers: { 'X-Admin-Password': password, 'Content-Type': 'application/json' },
      body: JSON.stringify({ submissionId: submissionId }),
    });
    if (!res.ok) throw new Error('Delete failed');
    return res.json();
  }

  async function fetchReportNodes(password) {
    const res = await fetch('/api/admin/report-nodes', {
      headers: { 'X-Admin-Password': password },
    });
    if (!res.ok) throw new Error(res.status === 401 ? 'Wrong password' : 'Request failed');
    return res.json();
  }

  async function updateReportNode(password, id, bodyText) {
    const res = await fetch('/api/admin/report-nodes', {
      method: 'PUT',
      headers: { 'X-Admin-Password': password, 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id, body: bodyText }),
    });
    if (!res.ok) throw new Error('Save failed');
    return res.json();
  }

  function renderMenu() {
    const grid = document.getElementById('menu-grid');
    grid.innerHTML = MENU_ITEMS.map(function (item) {
      const disabledClass = item.live ? '' : ' disabled';
      const iconClass = item.live ? '' : ' dim';
      const badge = item.live ? '' : ' <span class="menu-badge">| Not live</span>';
      return (
        '<button type="button" class="menu-card' + disabledClass + '" data-id="' + item.id + '"' + (item.live ? '' : ' disabled') + '>' +
        '<span class="menu-icon' + iconClass + '">' + item.icon + '</span>' +
        '<span class="menu-text">' +
        '<p class="menu-title">' + escapeHtml(item.title) + badge + '</p>' +
        '<p class="menu-desc">' + escapeHtml(item.desc) + '</p>' +
        '</span>' +
        (item.live ? '<span class="menu-arrow">' + ICONS.chevron + '</span>' : '') +
        '</button>'
      );
    }).join('');
  }

  function getSortValue(s, field) {
    if (field === 'score_percent') return Number(s.score_percent) || 0;
    return (s[field] || '').toString().toLowerCase();
  }

  function sortedSubmissions(list) {
    const sorted = list.slice().sort(function (a, b) {
      const va = getSortValue(a, sortField);
      const vb = getSortValue(b, sortField);
      let cmp;
      if (typeof va === 'number' && typeof vb === 'number') {
        cmp = va - vb;
      } else {
        cmp = String(va).localeCompare(String(vb));
      }
      return sortDir === 'asc' ? cmp : -cmp;
    });
    return sorted;
  }

  function rowHtml(s) {
    const date = s.created_at ? new Date(s.created_at).toLocaleString() : '';
    return (
      '<tr>' +
      '<td>' + escapeHtml(s.submission_id) + '</td>' +
      '<td>' + escapeHtml(date) + '</td>' +
      '<td>' + escapeHtml(s.company_name) + '</td>' +
      '<td>' + escapeHtml(s.email) + '</td>' +
      '<td>' + escapeHtml(s.business_size) + '</td>' +
      '<td>' + escapeHtml(s.role) + '</td>' +
      '<td><span class="tier-pill">' + escapeHtml(s.tier_name) + '</span></td>' +
      '<td>' + escapeHtml(s.leak_category) + '</td>' +
      '<td>' + escapeHtml(s.score_percent) + '%</td>' +
      '<td>' + escapeHtml(s.country) + '</td>' +
      '<td>' + escapeHtml(s.city) + '</td>' +
      '<td><button type="button" class="view-btn" data-view="' + escapeHtml(s.submission_id) + '">View</button></td>' +
      '</tr>'
    );
  }

  function renderRows() {
    document.getElementById('count-label').textContent = submissions.length + ' total';
    const body = document.getElementById('table-body');
    document.getElementById('group-btn').classList.toggle('active', groupByCompany);
    document.getElementById('sort-dir-btn').textContent = sortDir === 'asc' ? '↑ Ascending' : '↓ Descending';

    if (!groupByCompany) {
      body.innerHTML = sortedSubmissions(submissions).map(rowHtml).join('');
      return;
    }

    const groups = {};
    submissions.forEach(function (s) {
      const key = s.company_name || '(No company)';
      groups[key] = groups[key] || [];
      groups[key].push(s);
    });
    const groupNames = Object.keys(groups).sort(function (a, b) { return a.localeCompare(b); });
    let html = '';
    groupNames.forEach(function (name) {
      html += '<tr class="group-row"><td colspan="12">' + escapeHtml(name) + ' (' + groups[name].length + ')</td></tr>';
      html += sortedSubmissions(groups[name]).map(rowHtml).join('');
    });
    body.innerHTML = html;
  }

  function rnTierOrQuestion(n) {
    if (n.node_type === 'summary') return RN_TIER_LABELS[n.tier] || n.tier || '';
    return (n.question_id || '').toUpperCase();
  }

  function rnFilteredNodes() {
    const q = rnSearch.trim().toLowerCase();
    return reportNodes.filter(function (n) {
      if (rnSectionFilter && n.section !== rnSectionFilter) return false;
      if (rnRoleFilter && n.role !== rnRoleFilter) return false;
      if (q) {
        const inId = (n.id || '').toLowerCase().indexOf(q) !== -1;
        const inBody = (n.body || '').toLowerCase().indexOf(q) !== -1;
        if (!inId && !inBody) return false;
      }
      return true;
    });
  }

  function rnRowHtml(n) {
    const body = n.body || '';
    const preview = body.length > 120 ? body.slice(0, 120) + '…' : body;
    return (
      '<tr>' +
      '<td>' + escapeHtml(n.id) + '</td>' +
      '<td>' + escapeHtml(RN_SECTION_LABELS[n.section] || n.section) + '</td>' +
      '<td>' + escapeHtml(RN_ROLE_LABELS[n.role] || n.role) + '</td>' +
      '<td>' + escapeHtml(RN_SIZE_LABELS[n.company_size] || n.company_size) + '</td>' +
      '<td>' + escapeHtml(rnTierOrQuestion(n)) + '</td>' +
      '<td class="rn-preview">' + escapeHtml(preview) + '</td>' +
      '<td><button type="button" class="view-btn" data-rn-view="' + escapeHtml(n.id) + '">View</button></td>' +
      '</tr>'
    );
  }

  function renderReportNodes() {
    const list = rnFilteredNodes();
    document.getElementById('rn-count-label').textContent = list.length + ' of ' + reportNodes.length;
    document.getElementById('rn-group-btn').classList.toggle('active', rnGroupBySection);
    const body = document.getElementById('rn-table-body');

    if (!rnGroupBySection) {
      body.innerHTML = list.map(rnRowHtml).join('');
      return;
    }

    let html = '';
    RN_SECTION_ORDER.forEach(function (sec) {
      const group = list.filter(function (n) { return n.section === sec; });
      if (!group.length) return;
      html += '<tr class="group-row"><td colspan="7">' + escapeHtml(RN_SECTION_LABELS[sec]) + ' (' + group.length + ')</td></tr>';
      html += group.map(rnRowHtml).join('');
    });
    body.innerHTML = html;
  }

  function openReportNodeModal(id) {
    const n = reportNodes.filter(function (x) { return x.id === id; })[0];
    if (!n) return;

    const field = function (label, value) {
      return '<div class="modal-field"><dt>' + escapeHtml(label) + '</dt><dd>' + escapeHtml(value) + '</dd></div>';
    };
    const updated = n.updated_at ? new Date(n.updated_at).toLocaleString() : 'Not edited yet';

    const html =
      '<div class="modal-overlay" id="rn-modal-overlay">' +
      '<div class="modal-card">' +
      '<h2>' + escapeHtml(n.label) + '</h2>' +

      '<p class="modal-section-title">Reply details</p>' +
      '<div class="modal-grid">' +
      field('ID', n.id) +
      field('Section', RN_SECTION_LABELS[n.section] || n.section) +
      field('Role', RN_ROLE_LABELS[n.role] || n.role) +
      field('Company size', RN_SIZE_LABELS[n.company_size] || n.company_size) +
      field(n.node_type === 'summary' ? 'Tier' : 'Question', rnTierOrQuestion(n)) +
      field('Last updated', updated) +
      '</div>' +

      '<hr class="modal-divider">' +

      '<p class="modal-section-title">Reply text</p>' +
      '<textarea id="rn-body-input" class="rn-textarea"></textarea>' +
      '<div class="rn-editor-meta"><span id="rn-word-count"></span><span id="rn-save-status"></span></div>' +

      '<div class="modal-actions">' +
      '<button type="button" class="btn-ghost" id="rn-modal-close-btn">Close</button>' +
      '<button type="button" class="btn-primary" id="rn-modal-save-btn">Save changes</button>' +
      '</div>' +
      '</div></div>';

    document.getElementById('modal-root').innerHTML = html;

    const textarea = document.getElementById('rn-body-input');
    textarea.value = n.body || '';
    const updateWc = function () {
      const t = textarea.value.trim();
      const words = t ? t.split(/\s+/).length : 0;
      document.getElementById('rn-word-count').textContent = words + ' words';
    };
    updateWc();
    textarea.addEventListener('input', function () {
      updateWc();
      document.getElementById('rn-save-status').textContent = '';
    });

    document.getElementById('rn-modal-close-btn').addEventListener('click', closeModal);
    document.getElementById('rn-modal-overlay').addEventListener('click', function (e) {
      if (e.target.id === 'rn-modal-overlay') closeModal();
    });
    document.getElementById('rn-modal-save-btn').addEventListener('click', async function () {
      const pw = sessionStorage.getItem(PW_KEY);
      const status = document.getElementById('rn-save-status');
      const btn = this;
      btn.disabled = true;
      status.style.color = '#C6E000';
      status.textContent = 'Saving...';
      try {
        const data = await updateReportNode(pw, id, textarea.value);
        n.body = textarea.value;
        n.word_count = data.word_count;
        n.updated_at = data.updated_at;
        status.textContent = 'Saved · ' + new Date(data.updated_at).toLocaleString();
        renderReportNodes();
      } catch (err) {
        status.style.color = '#FF4081';
        status.textContent = err.message;
      } finally {
        btn.disabled = false;
      }
    });
  }

  function closeModal() {
    document.getElementById('modal-root').innerHTML = '';
  }

  function openModal(submissionId) {
    const s = submissions.filter(function (x) { return x.submission_id === submissionId; })[0];
    if (!s) return;
    const date = s.created_at ? new Date(s.created_at).toLocaleString() : '';
    let answers = [];
    try { answers = JSON.parse(s.answers_json || '[]'); } catch (e) {}

    const qaHtml = answers.map(function (a) {
      return (
        '<div class="qa-item">' +
        '<p class="qa-question">' + escapeHtml(a.question) + '</p>' +
        '<div class="qa-meta">' +
        '<span class="qa-category">' + escapeHtml(a.category) + '</span>' +
        '<span class="qa-answer">' + escapeHtml(a.label) + '</span>' +
        '</div></div>'
      );
    }).join('');

    const field = function (label, value) {
      return '<div class="modal-field"><dt>' + escapeHtml(label) + '</dt><dd>' + escapeHtml(value) + '</dd></div>';
    };

    const html =
      '<div class="modal-overlay" id="modal-overlay">' +
      '<div class="modal-card">' +
      '<h2>' + escapeHtml(s.company_name || 'Submission') + '</h2>' +

      '<p class="modal-section-title">Submission</p>' +
      '<div class="modal-grid">' +
      field('Submission ID', s.submission_id) +
      field('Date', date) +
      field('Score', s.score_percent + '%') +
      field('Tier', s.tier_name) +
      field('Leak category', s.leak_category) +
      '</div>' +

      '<p class="modal-section-title">Company &amp; contact</p>' +
      '<div class="modal-grid">' +
      field('Company', s.company_name) +
      field('Email', s.email) +
      field('Marketing opt-in', s.marketing_opt_in ? 'Yes' : 'No') +
      field('Business size', s.business_size) +
      field('Role', s.role) +
      '</div>' +

      '<p class="modal-section-title">Location</p>' +
      '<div class="modal-grid">' +
      field('Country', s.country) +
      field('Region', s.region) +
      field('City', s.city) +
      field('Timezone', s.timezone) +
      field('ISP', s.isp) +
      field('IP address', s.ip_address) +
      '</div>' +

      '<hr class="modal-divider">' +

      '<p class="modal-section-title">Questions &amp; answers</p>' +
      '<div class="qa-list">' + qaHtml + '</div>' +

      '<div class="modal-actions">' +
      '<button type="button" class="btn-danger" id="modal-delete-btn" data-id="' + escapeHtml(s.submission_id) + '">Delete record</button>' +
      '<button type="button" class="btn-ghost" id="modal-close-btn">Close</button>' +
      '</div>' +
      '</div></div>';

    document.getElementById('modal-root').innerHTML = html;

    document.getElementById('modal-close-btn').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', function (e) {
      if (e.target.id === 'modal-overlay') closeModal();
    });
    document.getElementById('modal-delete-btn').addEventListener('click', async function () {
      if (!confirm('Delete this submission? This cannot be undone.')) return;
      const pw = sessionStorage.getItem(PW_KEY);
      try {
        await deleteSubmission(pw, submissionId);
        submissions = submissions.filter(function (x) { return x.submission_id !== submissionId; });
        closeModal();
        renderRows();
      } catch (err) {
        alert(err.message);
      }
    });
  }

  async function login(password) {
    try {
      const data = await fetchSubmissions(password);
      submissions = data.submissions;
      sessionStorage.setItem(PW_KEY, password);
      renderMenu();
      showView('menu-view');
    } catch (err) {
      showError(err.message);
    }
  }

  function logout() {
    sessionStorage.removeItem(PW_KEY);
    submissions = [];
    reportNodes = [];
    showView('login-view');
  }

  document.getElementById('login-btn').addEventListener('click', function () {
    const pw = document.getElementById('password-input').value;
    login(pw);
  });

  document.getElementById('password-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });

  document.getElementById('menu-logout-btn').addEventListener('click', logout);
  document.getElementById('logout-btn').addEventListener('click', logout);

  document.getElementById('menu-grid').addEventListener('click', function (e) {
    const card = e.target.closest('.menu-card');
    if (!card || card.disabled) return;
    const id = card.getAttribute('data-id');
    if (id === 'quiz-submissions') {
      renderRows();
      showView('submissions-view');
    } else if (id === 'report-nodes') {
      const pw = sessionStorage.getItem(PW_KEY);
      fetchReportNodes(pw).then(function (data) {
        reportNodes = data.nodes;
        renderReportNodes();
        showView('report-nodes-view');
      }).catch(function (err) {
        alert(err.message);
      });
    }
  });

  document.getElementById('back-btn').addEventListener('click', function () {
    renderMenu();
    showView('menu-view');
  });

  document.getElementById('group-btn').addEventListener('click', function () {
    groupByCompany = !groupByCompany;
    renderRows();
  });

  document.getElementById('sort-field').addEventListener('change', function (e) {
    sortField = e.target.value;
    renderRows();
  });

  document.getElementById('sort-dir-btn').addEventListener('click', function () {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    renderRows();
  });

  document.getElementById('table-body').addEventListener('click', function (e) {
    const btn = e.target.closest('.view-btn');
    if (!btn) return;
    openModal(btn.getAttribute('data-view'));
  });

  document.getElementById('rn-back-btn').addEventListener('click', function () {
    renderMenu();
    showView('menu-view');
  });
  document.getElementById('rn-logout-btn').addEventListener('click', logout);

  document.getElementById('rn-group-btn').addEventListener('click', function () {
    rnGroupBySection = !rnGroupBySection;
    renderReportNodes();
  });
  document.getElementById('rn-section-filter').addEventListener('change', function (e) {
    rnSectionFilter = e.target.value;
    renderReportNodes();
  });
  document.getElementById('rn-role-filter').addEventListener('change', function (e) {
    rnRoleFilter = e.target.value;
    renderReportNodes();
  });
  document.getElementById('rn-search').addEventListener('input', function (e) {
    rnSearch = e.target.value;
    renderReportNodes();
  });

  document.getElementById('rn-table-body').addEventListener('click', function (e) {
    const btn = e.target.closest('.view-btn');
    if (!btn) return;
    openReportNodeModal(btn.getAttribute('data-rn-view'));
  });

  const savedPw = sessionStorage.getItem(PW_KEY);
  if (savedPw) login(savedPw);
</script>

</body>
</html>
